name: Deploy to EC2 SSM

on:
  push:
    branches:
      - main

jobs:
  CI-CD:
    runs-on: ubuntu-latest
    steps:
      # 1. 코드 체크아웃
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. JDK 설정
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      # 3. Gradle 빌드 (jar 파일 생성)
      - name: Build with Gradle
        run: chmod -x ./gradlew
        working-directory: ./community-BE

      # 4. application.yaml 생성
      - name: Generate application.yaml
        run: |
          mkdir -p community-BE/src/main/resources
          echo "${{secrets.APPLICATION_YAML}}" > community-BE/src/main/resources/application.yaml

      # 5. Gradle 빌드 (jar 파일 생성 테스트 제외)
      - name : Build with Gradle
        run: ./gradlew build -x test

      # 6. Docker 로그인
      - name: Docker login
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 7. Docker 이미지 빌드 및 푸시
      - name: Build and push Docker images
        run: |
          docker build -t zven408/community-be-app:1.0.0 ./community-BE
          docker push zven408/community-be-app:1.0.0

      # 8. AWS 인증 설정
      - name: Set up AWS CLI
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_S3_REGION }}

      # 6. EC2에 Docker 실행 명령 전달
      - name: Deploy to EC2
        with:
          host: ${{ secrets.EC2_HOST }}
          user: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_KEY }}
          script: |
            echo "bastion login to EC2..."
            cd /tmp
            # 1. bastion 서버에 SSH 접속 후 WAS EC2로 접속
            sudo ssh -i ${{ secrets.EC2_WAS_KEY }} ubuntu@${{ secrets.EC2_WAS_PRIVATE_IP }}
            sudo systemctl daemon-reload
            sudo systemctl restart my_crud.service
          
