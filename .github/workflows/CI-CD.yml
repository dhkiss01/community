name: Deploy to EC2 SSM

on:
  push:
    branches:
      - main

jobs:
  CI-CD:
    runs-on: ubuntu-latest
    steps:
      # 1. 코드 체크아웃
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install
      
      - name: Run a build script
        run: npm run build

      # 2. JDK 설정
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      # 3. Gradle 실행 권한 부여 (+x 로 수정)
      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew
        working-directory: ./community-BE

      # 4. application.yaml 생성
      - name: Generate application.yaml
        run: |
          mkdir -p community-BE/src/main/resources
          echo "${{secrets.APPLICATION_YAML}}" > community-BE/src/main/resources/application.yaml

      # 5. Gradle 빌드
      - name: Build with Gradle
        run: ./gradlew build -x test
        working-directory: ./community-BE

      # 6. Docker 로그인
      - name: Docker login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 7. Docker 이미지 빌드 및 푸시
      - name: Build and push Docker images
        run: |
          docker build -t zven408/community-be-app:1.0.0 ./community-BE
          docker push zven408/community-be-app:1.0.0

      # 8. AWS 인증 설정
      - name: Set up AWS CLI
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_S3_REGION }}

      # 9. EC2 배포 
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          user: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_KEY }}
          script: |
            echo "Connected to Bastion. Target -> WAS..."
          
            
            # 2. Bastion에서 WAS로 SSH 접속과 동시에 명령어 원격 실행
            cd /tmp
            ssh -i ktb-community-key.pem ubuntu@${{ secrets.EC2_WAS_HOST }}
              "sudo systemctl daemon-reload && sudo systemctl restart my_crud.service"