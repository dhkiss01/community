version: '3.8'

services:
  backend:
    image: zven408/community-be-app:1.0.0
    container_name: backend-community
    ports:
      - "8080:8080"
    environment:
      - JWT_SKY=${JWT_SKY}
      - AWS_ACCESS_KEY=${AWS_ACCESS_KEY}
      - AWS_SECRET_KEY=${AWS_SECRET_KEY}
      - AWS_S3_REGION=${AWS_S3_REGION}
      - AWS_S3_BUCKET=${AWS_S3_BUCKET}
      - SPRING_DATASOURCE_URL=${SPRING_DATASOURCE_URL}
      - DB_NAME=${DB_NAME}
      - DB_PASSWORD=${DB_PASSWORD}
      - SPRING_JPA_HIBERNATE_DDL_AUTO=none
    restart: always
    networks:
        - community_network

  frontend:
    image: zven408/community-fe-app:1.0.2
    container_name: frontend-community
    ports:
      - "3000:3000"
    restart: always
    networks:
      - community_network

networks:
  community_network:
    external: true
    name: community